<html lang="ko">
<head>
<meta charset="UTF-8">

<title>재고일자 현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#F0F2F5;padding:20px 16px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:20px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.header p{font-size:12px;color:#888}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.sc{flex:1;min-width:70px;max-width:120px;background:#fff;border-radius:10px;padding:10px 8px;text-align:center;border:0.5px solid #E0E0E0;border-top:3px solid;cursor:pointer;transition:all .15s}

.sc.on{box-shadow:0 0 0 2.5px var(--sc-col)}
.sc .sv{font-size:20px;font-weight:700}
.sc .sl{font-size:10px;color:#888;margin-top:2px}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.sinput{flex:1;padding:9px 13px;border:1.5px solid #E0E0E0;border-radius:9px;font-size:13px;outline:none;background:#fff}
.sinput:focus{border-color:#4361EE}
.filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fsel{padding:7px 10px;border:1.5px solid #E0E0E0;border-radius:8px;font-size:12px;background:#fff;outline:none;cursor:pointer;min-width:110px}
.fsel:focus{border-color:#4361EE}
.count-bar{font-size:12px;color:#888;margin-bottom:8px;padding:0 2px}
.count-bar b{color:#1a1a2e;font-weight:700}
.tw{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:380px}
thead th{background:#1a1a2e;color:#fff;padding:11px 12px;font-size:11px;font-weight:600;white-space:nowrap;text-align:center}
thead th.tl{text-align:left}
tbody td{padding:9px 12px;text-align:center;border-bottom:0.5px solid #F2F4F8;font-size:13px;color:#333}
tbody td.tl{text-align:left}
tbody tr:hover td{background:#F5F7FF}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap}
.b30{background:#E8F5E9;color:#1B5E20}
.b60{background:#FFFDE7;color:#795548}
.b75{background:#FFE0B2;color:#BF360C}
.b90{background:#FFCDD2;color:#B71C1C}
.b9x{background:#E1BEE7;color:#4A148C}
.empty{text-align:center;padding:36px;color:#bbb;font-size:13px}
</style>

function buildCards(){
  const div=document.getElementById('sumCards');
  div.innerHTML='';
  const segCnts={};
  SEG.forEach(s=>segCnts[s]=ALL.filter(r=>r[3]===s).length);

  const tot=document.createElement('div');
  tot.className='sc'+(activeSeg==='전체'?' on':'');
  tot.style.setProperty('--sc-col','#1a1a2e');
  tot.style.borderTopColor='#1a1a2e';
  tot.innerHTML=`<div class="sv" style="color:#1a1a2e">${ALL.length}</div><div class="sl">전체</div>`;
  tot.onclick=()=>{activeSeg='전체';document.getElementById('fSeg').value='';buildCards();render();};
  div.appendChild(tot);

  SEG.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='sc'+(activeSeg===s?' on':'');
    d.style.setProperty('--sc-col',SC_COL[i]);
    d.style.borderTopColor=SC_COL[i];
    d.innerHTML=`<div class="sv" style="color:${SC_COL[i]}">${segCnts[s]}</div><div class="sl">${s}</div>`;
    d.onclick=()=>{activeSeg=activeSeg===s?'전체':s;document.getElementById('fSeg').value=activeSeg==='전체'?'':activeSeg;buildCards();render();};
    div.appendChild(d);
  });
}

// 필터 옵션
const cars=[...new Set(ALL.map(r=>r[1]))].sort();
const mgrs=[...new Set(ALL.map(r=>r[4]))].sort();
const fSeg=document.getElementById('fSeg'),fCar=document.getElementById('fCar'),fMgr=document.getElementById('fMgr');
SEG.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fSeg.appendChild(o);});
cars.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fCar.appendChild(o);});
mgrs.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;fMgr.appendChild(o);});

function onSegChange(){activeSeg=fSeg.value||'전체';buildCards();render();}
fSeg.onchange=onSegChange;

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const fS=fSeg.value,fC=fCar.value,fM=fMgr.value;
  let rows=ALL.filter(r=>{
    if(activeSeg!=='전체'&&r[3]!==activeSeg)return false;
    if(fS&&r[3]!==fS)return false;
    if(fC&&r[1]!==fC)return false;
    if(fM&&r[4]!==fM)return false;
    if(q&&!r[0].toLowerCase().includes(q)&&!r[1].toLowerCase().includes(q)&&!r[4].toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('countBar').innerHTML=`<b>${rows.length}</b>대 표시 중 (전체 ${ALL.length}대)`;
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="5" class="empty">검색 결과가 없습니다</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>`<tr>
    <td class="tl">${r[0]}</td>
    <td class="tl">${r[1]}</td>
    <td>${r[2]}</td>
    <td><span class="badge ${BC[si(r[3])]}">${r[3]}</span></td>
    <td>${r[4]}</td>
  </tr>`).join('');
}

buildCards();
render();
</script>
